<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loyola Thozhan | Full-Page Assistant</title>
    <style>
        :root { --navy: #002147; --gold: #B8860B; --light: #f4f7f6; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--navy); overflow: hidden; }

        /* Splash / Logo Screen */
        #splash-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
            background: var(--navy); transition: all 0.8s ease;
        }
        #splash-logo { width: 180px; height: 180px; border-radius: 20px; border: 4px solid var(--gold); margin-bottom: 20px; }
        #splash-msg { color: white; font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; }

        /* Main Chat Layout */
        #main-container {
            width: 100%; height: 100%; display: none; flex-direction: column;
            background: white; animation: slideUp 0.6s ease;
        }

        #header {
            background: var(--navy); color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-brand img { width: 40px; height: 40px; border-radius: 6px; background: white; padding: 2px; }

        /* Chat Area with Watermark */
        #chat-area {
            flex: 1; overflow-y: auto; padding: 25px;
            background: white url('https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg') no-repeat center;
            background-size: 300px; position: relative; display: flex; flex-direction: column; gap: 15px;
        }
        #chat-area::before { content: ""; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.94); z-index: 0; }

        .msg { z-index: 1; max-width: 80%; padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.5; animation: fadeIn 0.4s; }
        .bot { background: #f0f2f5; color: var(--navy); align-self: flex-start; border-bottom-left-radius: 2px; border-left: 5px solid var(--gold); }
        .user { background: var(--navy); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .voice-icon { cursor: pointer; margin-left: 10px; font-size: 16px; opacity: 0.7; transition: 0.2s; }
        .voice-icon:hover { opacity: 1; color: var(--gold); }

        /* Buttons & Inputs */
        .sug-container { z-index: 1; display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
        .sug-btn { background: white; border: 2px solid var(--navy); color: var(--navy); padding: 8px 16px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .sug-btn:hover { background: var(--navy); color: white; }

        #input-panel { padding: 20px; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
        #user-msg { flex: 1; border: 1px solid #ddd; padding: 15px 20px; border-radius: 30px; outline: none; font-size: 16px; }
        .ctrl-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--navy); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<!-- 1. Splash Screen -->
<div id="splash-screen">
    <img id="splash-logo" src="https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg">
    <div id="splash-msg">LOYOLA THOZHAN</div>
</div>

<!-- 2. Main Chat App -->
<div id="main-container">
    <div id="header">
        <div class="header-brand">
            <img src="https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg">
            <div><b>Loyola Thozhan</b><br><small style="color:#4caf50;">● Digital Assistant</small></div>
        </div>
        <button onclick="logout()" style="background:var(--gold); border:none; color:white; padding:6px 12px; border-radius:5px; cursor:pointer; font-weight:bold;">Logout</button>
    </div>

    <div id="chat-area"></div>

    <div id="input-panel">
        <button class="ctrl-btn" onclick="startVoiceRecognition()">🎤</button>
        <input type="text" id="user-msg" placeholder="Type your message here..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="ctrl-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // CSV Links from your Sheet
    const db = {
        history: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOx1CY1ARp2KQySoW5NyAILv2Z_t8YUBURHY-TZUHmHt0DOsxqXMeH1MfbwJoUu46RzDxhoPNGN4gC/pub?gid=2120131688&single=true&output=csv",
        dir: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOx1CY1ARp2KQySoW5NyAILv2Z_t8YUBURHY-TZUHmHt0DOsxqXMeH1MfbwJoUu46RzDxhoPNGN4gC/pub?gid=1759326812&single=true&output=csv",
        proc: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOx1CY1ARp2KQySoW5NyAILv2Z_t8YUBURHY-TZUHmHt0DOsxqXMeH1MfbwJoUu46RzDxhoPNGN4gC/pub?gid=819567382&single=true&output=csv"
    };

    let step = 0;
    let user = { name: '', role: '', shift: '', dept: '' };
    const chat = document.getElementById('chat-area');

    // INITIAL LOAD
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
                initiateConversation();
            }, 800);
        }, 2000);
    };

    function addMessage(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        let html = `<span>${text}</span>`;
        if(side === 'bot') html += `<span class="voice-icon" onclick="speakText('${text.replace(/'/g, "\\'")}')">🔊</span>`;
        div.innerHTML = html;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function showSuggestions(list) {
        const div = document.createElement('div');
        div.className = 'sug-container';
        list.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'sug-btn';
            btn.innerText = item;
            btn.onclick = () => { addMessage(item, 'user'); handleLogic(item); };
            div.appendChild(btn);
        });
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function initiateConversation() {
        const saved = localStorage.getItem('lt_user');
        if(saved) {
            user = JSON.parse(saved);
            step = 100;
            addMessage(`Welcome back, ${user.name}! How can I help you today?`, 'bot');
            mainMenu();
        } else {
            addMessage("Vanakkam! Welcome to Loyola Thozhan. To begin, please enter your Full Name:", 'bot');
            step = 1;
        }
    }

    function sendMessage() {
        const input = document.getElementById('user-msg');
        const val = input.value.trim();
        if(!val) return;
        addMessage(val, 'user');
        input.value = '';
        handleLogic(val);
    }

    async function handleLogic(val) {
        setTimeout(async () => {
            if(step === 1) {
                user.name = val;
                addMessage(`Thank you, ${val}. Please select your role:`, 'bot');
                showSuggestions(['Student', 'Staff', 'Guest']);
                step = 2;
            } else if(step === 2) {
                user.role = val;
                if(val === 'Student') {
                    addMessage("Understood. Which shift are you in?", 'bot');
                    showSuggestions(['Shift 1', 'Shift 2']);
                    step = 3;
                } else { finalizeProfile(); }
            } else if(step === 3) {
                user.shift = val;
                addMessage("Please enter your Department Code (e.g., 23-UAZ-051):", 'bot');
                step = 4;
            } else if(step === 4) {
                user.dept = val;
                finalizeProfile();
            } else {
                await processQuery(val);
            }
        }, 600);
    }

    function finalizeProfile() {
        localStorage.setItem('lt_user', JSON.stringify(user));
        step = 100;
        addMessage("Profile created successfully! What would you like to know?", 'bot');
        mainMenu();
    }

    function mainMenu() {
        showSuggestions(['History', 'Scholarships', 'Who is Who', 'OD Procedure', 'End Chat']);
    }

    async function processQuery(q) {
    const scriptURL = "https://script.google.com/macros/s/AKfycbz_YcazodH28P6L2m6vAm50B-p-3a9fUotfQnPxNoOVEEDqnv3kN5odqwRk6q5Mot6J/exec";
    
    // Add a loading message
    addMessage("Thinking...", 'bot');

    const response = await fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({
            query: q,
            user: user // Passes Name, Shift, and Dept Number
        })
    });

    const data = await response.json();
    
    // Update the "Thinking..." message with the real AI answer
    const bots = document.querySelectorAll('.bot span');
    bots[bots.length - 1].innerText = data.reply;
    
    speakText(data.reply); // Read it aloud for accessibility
    setTimeout(mainMenu, 1000);
}
    function terminateApp() {
        document.getElementById('main-container').style.display = 'none';
        const splash = document.getElementById('splash-screen');
        splash.style.display = 'flex';
        splash.style.opacity = '1';
        document.getElementById('splash-msg').innerHTML = "CHAT ENDED.<br><small>Refresh to start again.</small>";
    }

    // ACCESSIBILITY TOOLS
    function speakText(text) {
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'en-IN';
        window.speechSynthesis.speak(speech);
    }

    function startVoiceRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("Speech recognition not supported in this browser.");
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-IN';
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById('user-msg').value = e.results[0][0].transcript;
            sendMessage();
        };
    }

    function logout() {
        if(confirm("Logout and clear all data?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>

</body>
</html>
