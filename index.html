<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loyola Thozhan | Full-Page Assistant</title>
    <style>
        :root { --navy: #002147; --gold: #B8860B; --light: #f4f7f6; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--navy); overflow: hidden; }

        /* Splash Screen */
        #splash {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
            background: var(--navy); transition: opacity 0.8s ease;
        }
        #splash img { width: 180px; height: 180px; border-radius: 20px; border: 4px solid var(--gold); margin-bottom: 20px; }
        #splash h2 { color: white; letter-spacing: 2px; }

        /* Main App Container */
        #app {
            width: 100%; height: 100%; display: none; flex-direction: column;
            background: white; animation: slideUp 0.6s ease;
        }

        #header {
            background: var(--navy); color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--gold);
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand img { width: 40px; height: 40px; border-radius: 6px; background: white; padding: 2px; }

        /* Chat Window */
        #chat-box {
            flex: 1; overflow-y: auto; padding: 20px;
            background: white url('https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg') no-repeat center;
            background-size: 250px; position: relative; display: flex; flex-direction: column; gap: 15px;
        }
        #chat-box::before { content: ""; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.94); z-index: 0; }

        .msg { z-index: 1; max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s; }
        .bot { background: #f0f2f5; color: var(--navy); align-self: flex-start; border-bottom-left-radius: 2px; border-left: 4px solid var(--gold); }
        .user { background: var(--navy); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .speak-icon { cursor: pointer; margin-left: 10px; font-size: 14px; opacity: 0.7; }

        /* Controls */
        .sug-container { z-index: 1; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .sug-btn { background: white; border: 2px solid var(--navy); color: var(--navy); padding: 8px 14px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; }

        #input-area { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        #user-input { flex: 1; border: 1px solid #ddd; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 15px; }
        .action-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--navy); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg">
    <h2>LOYOLA THOZHAN</h2>
</div>

<div id="app">
    <div id="header">
        <div class="brand">
            <img src="https://zendna1994.github.io/loyolathozhan/LoyolaThozhan.jpg">
            <div><b>Loyola Thozhan</b><br><small style="color:#4caf50;">● Online Assistant</small></div>
        </div>
        <button onclick="logout()" style="background:var(--gold); border:none; color:white; padding:6px 12px; border-radius:5px; cursor:pointer;">Reset</button>
    </div>

    <div id="chat-box"></div>

    <div id="input-area">
        <button class="action-btn" onclick="startVoice()">🎤</button>
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') handleSend()">
        <button class="action-btn" onclick="handleSend()">➤</button>
    </div>
</div>

<script>
    // CONFIGURATION
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_YcazodH28P6L2m6vAm50B-p-3a9fUotfQnPxNoOVEEDqnv3kN5odqwRk6q5Mot6J/exec";

    let step = 0;
    let user = { name: '', role: '', shift: '', deptNo: '' };
    const chatBox = document.getElementById('chat-box');

    // Load Sequence
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                startApp();
            }, 800);
        }, 2000);
    };

    function addMessage(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        let html = `<span>${text}</span>`;
        if(side === 'bot') html += `<span class="speak-icon" onclick="speak('${text.replace(/'/g, "\\'")}')">🔊</span>`;
        div.innerHTML = html;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showSuggestions(list) {
        const div = document.createElement('div');
        div.className = 'sug-container';
        list.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'sug-btn';
            btn.innerText = item;
            btn.onclick = () => { addMessage(item, 'user'); processFlow(item); };
            div.appendChild(btn);
        });
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function startApp() {
        const saved = localStorage.getItem('thozhan_user');
        if(saved) {
            user = JSON.parse(saved);
            step = 100;
            addMessage(`Welcome back, ${user.name}! How can I assist you today?`, 'bot');
            mainMenu();
        } else {
            addMessage("Vanakkam! Welcome to Loyola Thozhan. To get started, please enter your Full Name:", 'bot');
            step = 1;
        }
    }

    function handleSend() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if(!val) return;
        addMessage(val, 'user');
        input.value = '';
        processFlow(val);
    }

    async function processFlow(val) {
        if(step === 1) {
            user.name = val;
            addMessage(`Thank you ${val}. Are you a Student, Staff, or Guest?`, 'bot');
            showSuggestions(['Student', 'Staff', 'Guest']);
            step = 2;
        } else if(step === 2) {
            user.role = val;
            if(val === 'Student') {
                addMsgWithDelay("Which shift do you belong to?", ['Shift 1', 'Shift 2']);
                step = 3;
            } else { finalize(); }
        } else if(step === 3) {
            user.shift = val;
            addMessage("Please enter your Department Number (e.g., 23-UAZ-001):", 'bot');
            step = 4;
        } else if(step === 4) {
            user.deptNo = val;
            finalize();
        } else if(step === 100) {
            askAI(val);
        }
    }

    function addMsgWithDelay(text, sugs) {
        setTimeout(() => {
            addMessage(text, 'bot');
            if(sugs) showSuggestions(sugs);
        }, 500);
    }

    function finalize() {
        localStorage.setItem('thozhan_user', JSON.stringify(user));
        step = 100;
        addMessage("Profile set! You can ask about Scholarships, Procedures, or History.", 'bot');
        mainMenu();
    }

    function mainMenu() {
        showSuggestions(['History', 'Scholarships', 'Who is Who', 'Bonafide Certificate', 'End Chat']);
    }

    async function askAI(q) {
        if(q.toLowerCase() === 'end chat') {
            addMessage("Closing session. Refresh the page to restart. Have a great day!", 'bot');
            setTimeout(() => document.getElementById('app').style.display = 'none', 2000);
            return;
        }

        addMessage("Thinking...", 'bot');
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ query: q, user: user })
            });
            const data = await response.json();
            
            const bots = document.querySelectorAll('.bot span');
            bots[bots.length - 1].innerText = data.reply;
            speak(data.reply);
        } catch (e) {
            const bots = document.querySelectorAll('.bot span');
            bots[bots.length - 1].innerText = "I'm having trouble connecting to my database. Please try again.";
        }
        setTimeout(mainMenu, 1500);
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-IN';
        window.speechSynthesis.speak(utterance);
    }

    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("Speech recognition not supported.");
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-IN';
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById('user-input').value = e.results[0][0].transcript;
            handleSend();
        };
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }
</script>
</body>
</html>
